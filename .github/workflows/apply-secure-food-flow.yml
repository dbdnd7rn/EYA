name: Apply secure food flow

on:
  push:
    paths:
      - "scripts/apply-secure-food-flow.cjs"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply food security patch
        run: node scripts/apply-secure-food-flow.cjs
      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/checkout.tsx "app/(market)/restaurant/[session].tsx" lib/newApp/types.ts lib/newApp/orders.ts components/agent/useAgentWorkspace.ts lib/agentDeliveryApi.ts
          git commit -m "feat: secure food approval rider and room flow"
          git push
