name: Fix user hostel enquiry access

on:
  push:
    branches:
      - feat/supabase-backend-foundation
    paths:
      - .github/workflows/fix-user-hostel-enquiry.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/supabase-backend-foundation
          fetch-depth: 0

      - name: Patch legacy student-only checks
        shell: python
        run: |
          from pathlib import Path

          path = Path("app/(student)/room/[id].tsx")
          text = path.read_text(encoding="utf-8")

          replacements = [
              ('type Role = "student" | "landlord" | "admin";\n', ''),
              ('  const [role, setRole] = useState<Role | null>(null);\n', ''),
              ('        setRole(null);\n', ''),
              ('\n      const { data: prof } = await supabase.from("profiles").select("role").eq("id", authUser.id).maybeSingle();\n      setRole(((prof?.role as Role) ?? "student") as Role);', ''),
              ('if (!uid || role !== "student") {\n      Alert.alert("Login as a student to save rooms");', 'if (!uid) {\n      Alert.alert("Please sign in to save rooms");'),
              ('if (!uid) return Alert.alert("Please login as a student to write a review.");\n    if (role !== "student") return Alert.alert("Only students can write reviews.");', 'if (!uid) return Alert.alert("Please sign in to write a review.");'),
              ('if (!uid || role !== "student") {\n                       Alert.alert("Login as a student to send enquiries");', 'if (!uid) {\n                       Alert.alert("Please sign in to send enquiries");'),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"Expected code not found: {old!r}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'app/(student)/room/[id].tsx'
          git commit -m "fix: allow all signed-in users to use hostel enquiries"
          git push origin HEAD:feat/supabase-backend-foundation
